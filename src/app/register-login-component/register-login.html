<div class="page-container">
  <app-header></app-header>
  <main class="main-container">
    <div class="content-wrapper">
      <!-- Logged Out View: Login/Register Card -->
      <div *ngIf="!user()" class="auth-card animate-fade-in">
        <div class="auth-header">
          <h1 class="brand-title">Drop House</h1>
          <p class="brand-subtitle">{{ isLoginMode() ? 'Bienvenido de nuevo' : 'Crea tu cuenta' }}</p>
        </div>

        <form (ngSubmit)="handleSubmit()" class="auth-form">
          <div class="input-group" *ngIf="!isLoginMode()">
            <label for="fullName">Nombre Completo</label>
            <input type="text" id="fullName" name="fullName" placeholder="John Doe" [ngModel]="fullName()"
              (ngModelChange)="fullName.set($event)" required />
          </div>

          <div class="input-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="name@example.com" [ngModel]="email()"
              (ngModelChange)="email.set($event)" required />
          </div>

          <div class="input-group">
            <label for="password">Contraseña</label>
            <input type="password" id="password" name="password" placeholder="••••••••" [ngModel]="password()"
              (ngModelChange)="password.set($event)" required />
          </div>

          <div *ngIf="errorMessage()" class="error-banner">
            {{ errorMessage() }}
          </div>
          
          <div *ngIf="successMessage()" class="success-banner">
            {{ successMessage() }}
          </div>

          <button type="submit" class="primary-btn" [disabled]="loading()">
            <span *ngIf="!loading()">{{ isLoginMode() ? 'Iniciar Sesión' : 'Registrarse' }}</span>
            <span *ngIf="loading()" class="spinner"></span>
          </button>
        </form>

        <div class="auth-footer">
          <p>
            {{ isLoginMode() ? '¿No tienes cuenta?' : '¿Ya tienes cuenta?' }}
            <button (click)="toggleMode()" class="link-btn">
              {{ isLoginMode() ? 'Crea una ahora' : 'Inicia sesión' }}
            </button>
          </p>
        </div>
      </div>
    </div>
  </main>
  <app-footer></app-footer>
</div>
<router-outlet />
