<nav class="navbar">
  <div routerLink="/" class="logo"><span>DROP</span> HOUSE</div>
  <ul class="nav-links">
    <li routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">Inicio</li>
    <li routerLink="/catalogo" routerLinkActive="active">Catálogo</li>
    <li routerLink="/admin" [queryParams]="{tab: 'productos'}" routerLinkActive="active">Productos Admin</li>
    <li routerLink="/admin" [queryParams]="{tab: 'pedidos'}" routerLinkActive="active">Pedidos Admin</li>
  </ul>
  <div class="profile-btn">
    <ul class="nav-links">
      <li>
        <a routerLink="/carrito" class="cart-wrapper" style="cursor: pointer; text-decoration: none; color: inherit;">
          <div class="cart">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round">
              <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"></path>
              <line x1="3" y1="6" x2="21" y2="6"></line>
              <path d="M16 10a4 4 0 0 1-8 0"></path>
            </svg>
          </div>
          <span class="cart-badge" *ngIf="cartCount > 0">{{ cartCount }}</span>
        </a>
      </li>
      <li *ngIf="!isLoggedIn">
        <a routerLink="/register-login">
          <button class="login-btn">Iniciar sesión</button>
        </a>
      </li>
      <li *ngIf="isLoggedIn" class="auth-links">
        <a routerLink="/user-profile" title="Mi Perfil">
          <button class="profile-icon-btn">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
              <circle cx="12" cy="7" r="4"></circle>
            </svg>
          </button>
        </a>
        <button class="logout-btn-header" (click)="logout()" title="Cerrar sesión">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
        </button>
      </li>
    </ul>
  </div>
</nav>
